<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Merchandising - CoreFitness</title>

    <link rel="stylesheet" href="stylefile/reset.css">
    <link rel="stylesheet" href="stylefile/header.css">
    <link rel="stylesheet" href="stylefile/menu.css">
    <link rel="stylesheet" href="stylefile/page.css">
    <link rel="stylesheet" href="stylefile/section/merch.css"> 


</head>

<body>

<header>
    <div class="logo">
    <img src="stylefile/images/CoreFitness.png" alt="CoreFitness">
    </div>

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <nav class="menu">
        <a href="index.html">Home</a>

    </nav>
</header>

<div class="page">
<main>

<section class="merch">
    <h2>Merchandising CoreFitness</h2>

    <div class="merch-grid">

        <div class="merch-card">
            <img src="stylefile/images/t-shirt.png" alt="T-shirt CoreFitness">
            <h3>T-shirt CoreFitness</h3>
            <p class="price">€25</p>
            <a href="#" class="buy-btn">Acquista</a>
        </div>

        <div class="merch-card">
            <img src="stylefile/images/felpa.png" alt="Felpa CoreFitness">
            <h3>Felpa CoreFitness</h3>
            <p class="price">€45</p>
            <a href="#" class="buy-btn">Acquista</a>
        </div>

        <div class="merch-card">
            <img src="stylefile/images/borraccia.png" alt="Borraccia CoreFitness">
            <h3>Borraccia Sport</h3>
            <p class="price">€15</p>
            <a href="#" class="buy-btn">Acquista</a>
        </div>

        <div class="merch-card">
            <img src="stylefile/images/borsone.png" alt="Borsone palestra">
            <h3>Borsone Palestra</h3>
            <p class="price">€60</p>
            <a href="#" class="buy-btn">Acquista</a>
        </div>

        <div class="merch-card">
            <img src="stylefile/images/cappellino.png" alt="Cappellino CoreFitness">
            <h3>Cappellino</h3>
            <p class="price">€18</p>
            <a href="#" class="buy-btn">Acquista</a>
        </div>

        <div class="merch-card">
            <img src="stylefile/images/asciugamano.png" alt="Asciugamano palestra">
            <h3>Asciugamano</h3>
            <p class="price">€12</p>
            <a href="#" class="buy-btn">Acquista</a>
        </div>

    </div>
</section>

</main>
</div>

</html>
